<!DOCTYPE html>
<html>
  <head>
    <title>eTar</title>
    <style>
    .container {
      margin: 50px auto;
        background-color: #404040;
        width: 400px;
        padding: 15px;
    }
    .logo {
      width: 120px;
      /* background: black; */
      padding: 5px;
    }
    .logo-box {
      margin-bottom: 20px;
    }
    form {
      border: 1px solid black;
      padding: 15px;
      background-color: white;
    }
    label {
      display:block;
    }
    .warning-box {
      padding: 15px;
      color: white;
      background-color: darkred;
      border: 2px solid grey;
      margin-top: 15px;
    }
    .version {
      margin-top:15px ;
      color: #707070;
      text-align: right;
    }
    .status-box {
      margin-top: 15px;
      padding: 15px;
      border: 2px solid grey;
      background-color: #f5f5f5;
      min-height: 2em;
    }
    .status-box.error { background-color: #ffdddd; }
    .status-box.success { background-color: #ddffdd; }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">
            <div class="logo-box">
              <img class="logo" src="images/logo.png" />
            </div>

            <form id="update-form">
              <div class="field">
                <label for="firmware">Firmware</label>
                <input id="firmware" name="firmware" class="" type="file" required />
              </div>
              <button id="update" type="submit" class="btn">Update Firmware</button>
            </form>
            <div id="status" class="status-box" style="display:none;"></div>
            <div class="warning-box">
              <b>WARNING</b>
              <hr>
              <p>Ensure eTar is externally powered during update, and do not interrupt the update.</p>
              <p>The instrument will power off at the end of the update.</p>
            </div>
            <div class="version">{{version}}</div>
      </div>
    </div>
    <script>
      document.getElementById('update-form').onsubmit = function(e) {
        e.preventDefault();
        var fileInput = document.getElementById('firmware');
        var statusEl = document.getElementById('status');
        if (!fileInput.files.length) {
          statusEl.style.display = 'block';
          statusEl.className = 'status-box error';
          statusEl.innerHTML = '<p>Please select a firmware file.</p>';
          return false;
        }
        statusEl.style.display = 'block';
        statusEl.className = 'status-box';
        statusEl.innerHTML = '<p>Uploading, please wait… (this can take 1–2 minutes)</p>';
        var formData = new FormData();
        formData.append('firmware', fileInput.files[0]);
        fetch('/api/update', {
          method: 'POST',
          body: formData
        })
        .then(function(response) { return response.text(); })
        .then(function(text) {
          statusEl.innerHTML = text;
          if (text.indexOf('success') !== -1 || text.indexOf('successfully') !== -1) {
            statusEl.className = 'status-box success';
          } else if (text.indexOf('failed') !== -1 || text.indexOf('Transfer failed') !== -1) {
            statusEl.className = 'status-box error';
          }
        })
        .catch(function(err) {
          statusEl.className = 'status-box error';
          statusEl.innerHTML = '<p>Request failed or timed out. Check the device is still on and try again.</p>';
        });
        return false;
      };
    </script>
  </body>
</html>
